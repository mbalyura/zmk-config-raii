include:
  # RAII Dongle (optional)
  - board: nice_nano_v2
    shield: raii_dongle
    snippet: studio-rpc-usb-uart
    artifact-name: raii-dongle

  # RAII Dongle with display (optional)
  - board: nice_nano_v2
    shield: raii_dongle_display dongle_display
    snippet: studio-rpc-usb-uart
    artifact-name: raii-dongle-display

  # RAII left can either be a central (no dongle) or peripheral (with dongle)
  - board: nice_nano_v2
    shield: raii_left_central
    snippet: studio-rpc-usb-uart
    artifact-name: raii-left-central
  - board: nice_nano_v2
    shield: raii_left_peripheral
    artifact-name: raii-left-peripheral

  # RAII right will always be a peripheral
  - board: nice_nano_v2
    shield: raii_right_peripheral
    artifact-name: raii-right-peripheral

  # Settings Reset
  - board: nice_nano_v2
    shield: settings_reset
    artifact-name: settings-reset
